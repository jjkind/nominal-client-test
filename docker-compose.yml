services:
  web:
    build:
      context: ./services/web
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env

  parser:
    build:
      context: ./services/parser
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - web